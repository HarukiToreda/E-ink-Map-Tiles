<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-ink Map Tile Builder</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQnbp2kgxuswVwvtn3dDr+gYlnhV4Y="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-pane" aria-label="Map area selector">
        <div id="map"></div>
      </section>

      <aside class="control-pane" aria-label="Tile export controls">
        <header class="brand-block">
          <p class="eyebrow">E-ink map tiles</p>
          <h1>Choose an area, export a legal tile job.</h1>
        </header>

        <section class="panel">
          <div class="panel-title">
            <h2>Area</h2>
            <button id="useViewButton" type="button">Use View</button>
          </div>
          <div class="grid two">
            <label>
              West
              <input id="westInput" type="number" step="0.000001" />
            </label>
            <label>
              South
              <input id="southInput" type="number" step="0.000001" />
            </label>
            <label>
              East
              <input id="eastInput" type="number" step="0.000001" />
            </label>
            <label>
              North
              <input id="northInput" type="number" step="0.000001" />
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Tiles</h2>
            <output id="tileCount">0 tiles</output>
          </div>
          <div class="grid two">
            <label>
              Min zoom
              <input id="minZoomInput" type="number" min="0" max="20" value="6" />
            </label>
            <label>
              Max zoom
              <input id="maxZoomInput" type="number" min="0" max="20" value="12" />
            </label>
            <label>
              Style name
              <input id="styleInput" type="text" value="osm-eink" />
            </label>
            <label>
              Mode
              <select id="modeInput">
                <option value="grayscale" selected>Grayscale</option>
                <option value="mono">1-bit mono</option>
                <option value="palette">Palette</option>
                <option value="original">Original</option>
              </select>
            </label>
          </div>
          <label>
            Layout
            <select id="layoutInput">
              <option value="inkhud-dev" selected>tiles/{style}/z/x/y.png</option>
              <option value="style-root">{style}/z/x/y.png</option>
              <option value="single-map">map/z/x/y.png</option>
              <option value="meshtastic-sd">maps/{style}/z/x/y.png</option>
            </select>
          </label>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Legal Source</h2>
          </div>
          <label>
            Tile URL template
            <input id="urlInput" type="url" placeholder="http://127.0.0.1:8080/styles/eink/{z}/{x}/{y}.png" />
          </label>
          <p class="hint">
            Use a local renderer or provider that explicitly allows offline or bulk exports. The public OpenStreetMap tile
            server should not be used for tile bundle downloads.
          </p>
          <label class="check-row">
            <input id="permissionInput" type="checkbox" />
            <span>I have permission to export tiles from this source.</span>
          </label>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Output</h2>
          </div>
          <textarea id="commandOutput" readonly rows="5"></textarea>
          <div class="button-row">
            <button id="copyButton" type="button">Copy Command</button>
            <button id="jobButton" type="button">Download Job</button>
            <button id="zipButton" type="button">Download ZIP</button>
          </div>
          <p id="statusText" class="status" role="status"></p>
        </section>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
